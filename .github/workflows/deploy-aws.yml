# NS-DEPLOY-01 — build images, push to ECR, trigger App Runner (OIDC).
# Push: only when Docker/app inputs change (not every file under backend/ — e.g. tests, requirements-dev, CI).
# If `sts:AssumeRoleWithWebIdentity` fails: the GitHub deploy IAM role may be missing (e.g. after terraform destroy).
# Re-run Terraform / ./scripts/deploy-aws.sh to recreate `nyayasetu-github-deploy`, then set secret AWS_ROLE_TO_ASSUME to its ARN.
name: Deploy AWS
on:
  push:
    branches: [main]
    paths:
      - "backend/Dockerfile"
      - "backend/requirements.txt"
      - "backend/app/**"
      - "frontend/**"
      - ".github/workflows/deploy-aws.yml"
      - "docker-compose.yml"
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region (e.g. ap-south-1)"
        required: false
        type: string
        default: "ap-south-1"

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: false

# Minimal scope: OIDC to AWS + read repo
permissions:
  id-token: write
  contents: read

env:
  ECR_API_REPOSITORY: nyayasetu-api
  ECR_WEB_REPOSITORY: nyayasetu-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # stack region: workflow_dispatch input > repo variable > ap-south-1 (GHA default env GITHUB_EVENT_NAME, not GHA in bash conditions)
      - name: Resolve AWS region
        id: ar
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            R="${{ github.event.inputs.aws_region }}"
          else
            R='${{ vars.AWS_REGION || '' }}'
            if [ -z "$R" ] || [ "$R" = "null" ]; then R=ap-south-1; fi
          fi
          echo "region=$R" >> "$GITHUB_OUTPUT"
          echo "AWS region: $R"

      - name: Require repository secrets
        run: |
          if [ -z "$DEPLOY_ROLE" ] || [ "$DEPLOY_ROLE" = "" ]; then
            echo '::error::Set Actions secret AWS_ROLE_TO_ASSUME (from terraform output github_deploy_role_arn).'
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_API" ] || [ "$NEXT_PUBLIC_API" = "" ]; then
            echo '::error::Set Actions secret NEXT_PUBLIC_API_URL (public HTTPS API URL, no trailing slash).'
            exit 1
          fi
        env:
          DEPLOY_ROLE: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          NEXT_PUBLIC_API: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: nyayasetu-github-actions
          audience: sts.amazonaws.com
          aws-region: ${{ steps.ar.outputs.region }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Set registry URL
        id: ecr
        env:
          AWS_REGION: ${{ steps.ar.outputs.region }}
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Build & push API
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ steps.ar.outputs.region }}
        run: |
          docker build --platform linux/amd64 -t "${REGISTRY}/${ECR_API_REPOSITORY}:${IMAGE_TAG}" -t "${REGISTRY}/${ECR_API_REPOSITORY}:latest" backend
          docker push "${REGISTRY}/${ECR_API_REPOSITORY}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${ECR_API_REPOSITORY}:latest"

      # Pushing :latest to ECR triggers App Runner (AutoDeploymentsEnabled in Terraform / console).
      # Do not also call start-deployment: that races with the auto deploy and returns "isn't in RUNNING state".
      - name: Build & push Web
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ steps.ar.outputs.region }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # Same value as web_app_public_url / terraform output web_cloudfront_url (CloudFront, not App Runner) so the UI does not resolve to the *.awsapprunner.com hostname
          WEB_APP_PUBLIC_URL: ${{ vars.WEB_APP_PUBLIC_URL }}
        run: |
          test -n "$NEXT_PUBLIC_API_URL" || (echo "Add repo secret NEXT_PUBLIC_API_URL (HTTPS API URL from terraform output api_public_url)" && exit 1)
          EXTRA=()
          if [ -n "${WEB_APP_PUBLIC_URL}" ]; then EXTRA=(--build-arg "NEXT_PUBLIC_APP_URL=${WEB_APP_PUBLIC_URL}"); fi
          docker build --platform linux/amd64 \
            --build-arg "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" \
            "${EXTRA[@]}" \
            -t "${REGISTRY}/${ECR_WEB_REPOSITORY}:${IMAGE_TAG}" \
            -t "${REGISTRY}/${ECR_WEB_REPOSITORY}:latest" \
            frontend
          docker push "${REGISTRY}/${ECR_WEB_REPOSITORY}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${ECR_WEB_REPOSITORY}:latest"

