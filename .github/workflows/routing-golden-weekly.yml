# P6-01 — optional weekly golden routing + safety slice (cron + manual)
name: Routing golden weekly
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golden:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -r requirements-dev.txt
      - name: Classifier golden table
        run: python -m pytest tests/test_classifier_golden_cases.py -q
      - name: Routing / safety script
        run: ./scripts/run_routing_safety_tests.sh
