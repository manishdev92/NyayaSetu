# NS-S6-02 — minimal CI (no deploy)
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  repo-safety:
    name: No tracked .env or Terraform state
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden committed paths
        run: ./scripts/check-no-forbidden-secrets.sh

  backend:
    needs: repo-safety
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # requirements-dev.txt is on main; some branches may not have it — always install pytest
      - name: Install
        run: |
          pip install -r requirements.txt
          pip install "pytest>=7.0.0"
      - name: Pytest
        run: python -m pytest tests/ -q

  frontend:
    needs: repo-safety
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
