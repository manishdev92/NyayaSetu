# Teardown: Terraform in infra/terraform/nyayasetu (App Runner, ECR, IAM, optional OIDC).
# Manual only — no automatic runs. GitHub: Actions → "Destroy AWS (Terraform)" → Run workflow.
#
# Prerequisites (GitHub + AWS):
# - **Remote state in S3** (same key your laptop used after `terraform init -migrate-state`).
# - Repository **secret** `AWS_TERRAFORM_DESTROY_ROLE_ARN`: IAM role (OIDC trust to this repo) with
#   `terraform destroy` on this stack *and* read/write on the state object in S3 (and DynamoDB lock if used).
#   Not the ECR "Deploy AWS" role.
# - Repository **variable** `TERRAFORM_S3_STATE_BUCKET` and optional `TERRAFORM_S3_STATE_KEY`,
#   `TERRAFORM_S3_DYNAMODB_TABLE` (must match backend.s3.hcl on the machine you migrated from).
# - **Secret** `AWS_TERRAFORM_DESTROY_ROLE_ARN` = `terraform output -raw github_terraform_destroy_role_arn` (after a normal apply; not the ECR deploy role).
name: Destroy AWS (Terraform)
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type exactly: destroy-nyayasetu"
        required: true
        type: string
        default: ""
      create_github_oidc_provider:
        description: "Must match the value you used at apply (OIDC resource in this stack or not)"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

concurrency:
  group: destroy-aws-terraform
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_IN_AUTOMATION: "true"
  TERRAFORM_S3_STATE_KEY: ${{ vars.TERRAFORM_S3_STATE_KEY }}
  TERRAFORM_S3_STATE_REGION: ${{ vars.TERRAFORM_S3_STATE_REGION }}

jobs:
  destroy:
    if: github.event.inputs.confirm == 'destroy-nyayasetu'
    runs-on: ubuntu-latest
    env:
      DESTROY_ROLE: ${{ secrets.AWS_TERRAFORM_DESTROY_ROLE_ARN }}
      TERRAFORM_S3_DYNAMODB_TABLE: ${{ vars.TERRAFORM_S3_DYNAMODB_TABLE }}
    steps:
      - name: Check secrets and variables
        run: |
          if [ -z "$DESTROY_ROLE" ]; then
            echo '::error::Set repository secret AWS_TERRAFORM_DESTROY_ROLE_ARN to an OIDC role ARN (see infra/README, Destroy workflow). It must not be the ECR deploy role only.'
            exit 1
          fi
          if [ -z "${{ vars.TERRAFORM_S3_STATE_BUCKET }}" ]; then
            echo '::error::Set repository variable TERRAFORM_S3_STATE_BUCKET to the S3 bucket that holds the Terraform state (after S3 remote state migration; see infra/README).'
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_DESTROY_ROLE_ARN }}
          role-session-name: nyayasetu-terraform-destroy
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}

      - name: Who am I (debug)
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Write S3 backend config
        id: s3b
        working-directory: infra/terraform/nyayasetu
        run: |
          BUCKET='${{ vars.TERRAFORM_S3_STATE_BUCKET }}'
          KEY="${TERRAFORM_S3_STATE_KEY:-nyayasetu/terraform.tfstate}"
          S3R="${TERRAFORM_S3_STATE_REGION:-$AWS_REGION}"
          {
            echo "bucket = \"${BUCKET}\""
            echo "key    = \"${KEY}\""
            echo "region = \"${S3R}\""
            echo "encrypt = true"
          } > ci-backend.hcl
          if [ -n "$TERRAFORM_S3_DYNAMODB_TABLE" ]; then
            echo "dynamodb_table = \"${TERRAFORM_S3_DYNAMODB_TABLE}\"" >> ci-backend.hcl
          fi
          echo "state_key=$KEY" >> "$GITHUB_OUTPUT"
          echo "s3_region=$S3R" >> "$GITHUB_OUTPUT"

      - name: Ensure state object exists in S3
        run: |
          BUCKET='${{ vars.TERRAFORM_S3_STATE_BUCKET }}'
          KEY='${{ steps.s3b.outputs.state_key }}'
          S3R='${{ steps.s3b.outputs.s3_region }}'
          if ! aws s3api head-object --bucket "$BUCKET" --key "$KEY" --region "$S3R" 2>/dev/null; then
            echo '::error::No object at s3://'"$BUCKET"'/'"$KEY"' (region '"$S3R"'). Run terraform init -backend-config=backend.s3.hcl -migrate-state, or set TERRAFORM_S3_STATE_REGION if the bucket is not in '"$AWS_REGION"'. See infra/README (Remote state).'
            exit 1
          fi
        env:
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: infra/terraform/nyayasetu
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: terraform init -input=false -reconfigure -backend-config=ci-backend.hcl

      - name: Plan destroy
        working-directory: infra/terraform/nyayasetu
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          OIDC="${{ github.event.inputs.create_github_oidc_provider }}"
          terraform plan -destroy -out=tfdestroy -no-color -var="create_github_oidc_provider=$OIDC"

      - name: Apply destroy
        working-directory: infra/terraform/nyayasetu
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: terraform apply -auto-approve -no-color tfdestroy

  wrong-confirm:
    if: github.event.inputs.confirm != 'destroy-nyayasetu'
    runs-on: ubuntu-latest
    steps:
      - name: Reject
        run: |
          echo "Set the confirm field to exactly: destroy-nyayasetu (you sent: ${{ github.event.inputs.confirm }})"
          exit 1
