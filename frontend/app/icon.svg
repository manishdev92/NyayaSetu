<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="1" y1="0" x2="32" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0a09"/>
      <stop offset="0.38" stop-color="#1c1917"/>
      <stop offset="0.7" stop-color="#713f12"/>
      <stop offset="1" stop-color="#a16207"/>
    </linearGradient>
    <radialGradient id="s" cx="0.3" cy="0.2" r="0.7" gradientUnits="objectBoundingBox">
      <stop stop-color="#fffbeb" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#fffbeb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b" x1="4" y1="7" x2="28" y2="8.5" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde68a"/>
      <stop offset="0.45" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="p" x1="15" y1="8" x2="17" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fef3c7" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#d6d3d1" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#a8a29e" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.4" stdDeviation="0.35" flood-color="#0c0a09" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7.5" fill="url(#g)"/>
  <rect width="32" height="32" rx="7.5" fill="url(#s)"/>
  <rect x="0.4" y="0.4" width="31.2" height="31.2" rx="7.1" stroke="#fbbf24" stroke-opacity="0.28" stroke-width="0.8"/>
  <!-- Top beam: brass bar -->
  <rect x="3.8" y="6.35" width="24.4" height="1.7" rx="0.85" fill="url(#b)" stroke="#78350f" stroke-width="0.2" stroke-opacity="0.35"/>
  <!-- Fulcrum -->
  <circle cx="16" cy="7.2" r="1.55" fill="url(#b)" stroke="#92400e" stroke-width="0.35"/>
  <circle cx="16" cy="6.9" r="0.4" fill="#fffbeb" fill-opacity="0.55"/>
  <!-- Pillar -->
  <line x1="16" y1="8" x2="16" y2="24" stroke="url(#p)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="16" y1="8" x2="16" y2="24" stroke="#ffedd5" stroke-width="0.5" stroke-linecap="round" stroke-opacity="0.65"/>
  <!-- Chains: small links -->
  <g stroke="#e7e5e4" stroke-width="0.55" stroke-linecap="round" fill="none">
    <line x1="6.2" y1="8.1" x2="6.2" y2="9.2"/>
    <line x1="6.2" y1="10" x2="6.2" y2="10.7"/>
    <line x1="6.2" y1="11.5" x2="6.2" y2="12.8"/>
    <line x1="25.8" y1="8.1" x2="25.8" y2="9.2"/>
    <line x1="25.8" y1="10" x2="25.8" y2="10.7"/>
    <line x1="25.8" y1="11.5" x2="25.8" y2="12.8"/>
  </g>
  <!-- Pans: shadow, bowl, inner rim light -->
  <g filter="url(#sh)">
    <ellipse cx="6.3" cy="16.45" rx="3.1" ry="0.5" fill="#0c0a09" fill-opacity="0.35"/>
    <ellipse cx="25.7" cy="16.45" rx="3.1" ry="0.5" fill="#0c0a09" fill-opacity="0.35"/>
  </g>
  <ellipse cx="6.3" cy="16.1" rx="3.2" ry="1.6" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="0.45"/>
  <ellipse cx="25.7" cy="16.1" rx="3.2" ry="1.6" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="0.45"/>
  <ellipse cx="6.3" cy="15.2" rx="2.5" ry="0.7" fill="none" stroke="#a16207" stroke-width="0.22" stroke-opacity="0.4"/>
  <ellipse cx="25.7" cy="15.2" rx="2.5" ry="0.7" fill="none" stroke="#a16207" stroke-width="0.22" stroke-opacity="0.4"/>
  <ellipse cx="6.3" cy="15.1" rx="1.1" ry="0.3" fill="#fffbeb" fill-opacity="0.4"/>
  <ellipse cx="25.7" cy="15.1" rx="1.1" ry="0.3" fill="#fffbeb" fill-opacity="0.4"/>
</svg>
